cluster:
  name: bdcom-ha
  tenant: bdcom
  quorum: 2
  fence_timeout: 30s
  fail_threshold: 3        # consecutive failures before SDOWN
  check_interval: 5s       # sentinel check interval
  auto_failback: false     # no automatic failback (prevents flapping)
  max_failovers: 3         # max failovers in window
  failover_window: 1h      # anti-flap window
  observation_stale: 30s   # stale observation threshold

consul:
  address: "127.0.0.1:8500"
  datacenter: dc1
  session_ttl: 15s
  lock_delay: 5s

nodes:
  - id: bdcom1
    address: 10.255.246.173
    priority: 1
    ssh:
      user: root
      key_path: /root/.ssh/id_rsa
      port: 22
    fence_cmd: "ssh root@10.255.246.173 'poweroff'"

  - id: bdcom2
    address: 10.255.246.174
    priority: 2
    ssh:
      user: root
      key_path: /root/.ssh/id_rsa
      port: 22
    fence_cmd: "ssh root@10.255.246.174 'poweroff'"

groups:
  - id: sigtran-failover
    resources:
      # Step 1: VIP assignment
      - id: assign-vip
        type: vip
        attrs:
          ip: "10.255.246.175"
          cidr: "24"
          interface: eth0

      # Step 2: Manage sigtran service (generic action)
      - id: manage-sigtran
        type: action
        attrs:
          activate: "lxc exec sigtran-bdcom -- /opt/sigtran/start.sh"
          deactivate: "lxc exec sigtran-bdcom -- /opt/sigtran/stop.sh"
          check: "lxc exec sigtran-bdcom -- curl -sf http://127.0.0.1:8284/pinginfo | grep -q sctpUp"
          timeout: "30s"

      # Step 3: Notify routesphere
      - id: notify-rs
        type: action
        attrs:
          activate: "curl -sf -X POST http://10.10.199.200:19999/api/ha/promoted"
          deactivate: "curl -sf -X POST http://10.10.199.200:19999/api/ha/demoted"

    checks:
      # Cluster-scope: all nodes check the VIP (for SDOWN/ODOWN)
      - name: sigtran-health
        type: http
        target: "http://10.255.246.175:8284/pinginfo"
        expect: '"sctpUp":true'
        interval: 5s
        timeout: 3s
        scope: cluster

      # Self-scope: each node checks its own readiness (for candidate selection)
      - name: local-sigtran
        type: script
        target: "lxc exec sigtran-bdcom -- curl -sf http://127.0.0.1:8284/pinginfo"
        expect: "sctpUp"
        interval: 5s
        timeout: 3s
        scope: self

      - name: routesphere-health
        type: http
        target: "http://127.0.0.1:19999/q/health"
        expect: "UP"
        interval: 10s
        timeout: 5s
        scope: self
