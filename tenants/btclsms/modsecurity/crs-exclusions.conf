# OWASP CRS Exclusions - BTCL SMS
# Add rules here to prevent false positives on legitimate traffic

# Allow larger request bodies for API endpoints that accept file uploads or large JSON
SecRule REQUEST_URI "@beginsWith /api/v2/" \
    "id:10001,phase:1,nolog,pass,ctl:ruleRemoveById=920170"

# Relax rules on /ofbiz-spring/api — OFBiz uses non-standard request patterns
SecRule REQUEST_URI "@beginsWith /ofbiz-spring/api" \
    "id:10002,phase:1,nolog,pass,ctl:ruleRemoveTargetById=942100;ARGS,ctl:ruleRemoveTargetById=942200;ARGS"

# Relax rules on /report/ — reporting endpoints may have complex query params
SecRule REQUEST_URI "@beginsWith /report/" \
    "id:10003,phase:1,nolog,pass,ctl:ruleRemoveTargetById=942100;ARGS"

# Next.js app on port 9000 — static asset paths don't need WAF inspection
SecRule REQUEST_URI "@rx ^/_next/(static|image)/" \
    "id:10004,phase:1,nolog,allow"
