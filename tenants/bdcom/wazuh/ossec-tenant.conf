<ossec_config>

  <!-- BDCOM tenant-specific Wazuh configuration -->
  <!-- Merged with ossec-base.conf at container startup -->

  <!-- BDCOM-specific log collection -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/security-bundle/watchdog.log</location>
  </localfile>

  <!-- Registration password -->
  <auth>
    <use_password>yes</use_password>
  </auth>

</ossec_config>
