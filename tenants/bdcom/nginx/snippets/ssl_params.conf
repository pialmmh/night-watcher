# BDCOM - SSL parameters
# Certs are mounted from host at /etc/nginx/ssl/
# TODO: Update with BDCOM SSL certificate paths

ssl_certificate /etc/nginx/ssl/bdcom.crt;
ssl_certificate_key /etc/nginx/ssl/bdcom.key;
ssl_trusted_certificate /etc/nginx/ssl/bdcom.ca-bundle;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
