<ossec_config>

  <!-- Global settings -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
  </global>

  <!-- Log collection: nginx -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Log collection: ModSecurity audit -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/modsec_audit.log</location>
  </localfile>

  <!-- Log collection: Fail2Ban -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/fail2ban.log</location>
  </localfile>

  <!-- Log collection: CrowdSec -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/crowdsec.log</location>
  </localfile>

  <!-- Log collection: system auth -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- File integrity monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Monitor critical system directories -->
    <directories check_all="yes" realtime="yes">/etc/nginx</directories>
    <directories check_all="yes" realtime="yes">/etc/fail2ban</directories>
    <directories check_all="yes" realtime="yes">/etc/crowdsec</directories>
    <directories check_all="yes">/etc/ssh/sshd_config</directories>
    <directories check_all="yes">/etc/passwd,/etc/shadow,/etc/group</directories>

    <!-- Ignore frequently changing files -->
    <ignore>/etc/nginx/modsecurity/crs/rules</ignore>
    <ignore>/var/log</ignore>
  </syscheck>

  <!-- Rootcheck -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- Vulnerability detection -->
  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>12h</interval>
    <run_on_start>yes</run_on_start>
    <provider name="debian">
      <enabled>yes</enabled>
      <os>bookworm</os>
      <update_interval>1h</update_interval>
    </provider>
  </vulnerability-detector>

  <!-- Agent registration -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>yes</use_password>
    <ssl_agent_ca>/var/ossec/etc/sslmanager.ca</ssl_agent_ca>
    <ssl_verify_host>no</ssl_verify_host>
    <ssl_auto_negotiate>yes</ssl_auto_negotiate>
  </auth>

  <!-- Remote agent communication -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- Alerts -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- Custom decoders and rules -->
  <ruleset>
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <list>etc/lists/audit-keys</list>
  </ruleset>

  <!-- Indexer integration -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://127.0.0.1:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/wazuh-indexer/certs/root-ca.pem</ca>
      </certificate_authorities>
    </ssl>
  </indexer>

</ossec_config>
